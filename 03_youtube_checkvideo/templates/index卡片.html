<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频雷达 · 内容汇总</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
    .header{background:#fff;border-bottom:1px solid #e8e8e4;padding:16px 24px}
    .header-title{font-size:16px;font-weight:600}
    .header-sub{font-size:13px;color:#888;margin-top:2px}
    .main{max-width:760px;margin:0 auto;padding:32px 20px}

    /* 输入区 */
    .input-card{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:24px;margin-bottom:20px}
    .input-label{font-size:13px;color:#666;margin-bottom:8px}
    .input-row{display:flex;gap:10px}
    .url-input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border-color .15s}
    .url-input:focus{border-color:#1a1a1a}
    .submit-btn{padding:10px 22px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s}
    .submit-btn:hover{opacity:.85}
    .submit-btn:disabled{opacity:.4;cursor:not-allowed}

    /* 进度条 */
    .progress-wrap{margin-top:16px;display:none}
    .progress-wrap.show{display:block}
    .progress-steps{display:flex;gap:0;margin-bottom:10px}
    .step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
    .step:not(:last-child)::after{content:'';position:absolute;top:12px;left:60%;width:80%;height:1px;background:#e0e0e0;z-index:0}
    .step.done::after{background:#1a1a1a}
    .step-dot{width:24px;height:24px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#999;z-index:1;transition:all .3s}
    .step.active .step-dot{background:#1a1a1a;color:#fff;animation:pulse .8s ease-in-out infinite}
    .step.done .step-dot{background:#1a1a1a;color:#fff}
    .step-label{font-size:11px;color:#aaa;margin-top:5px;text-align:center}
    .step.active .step-label,.step.done .step-label{color:#555}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    .progress-msg{font-size:13px;color:#666;text-align:center;min-height:20px}
    .progress-msg.error{color:#c0392b}

    /* 报告区 */
    .report-card{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:28px;margin-bottom:20px;display:none}
    .report-card.show{display:block;animation:fadein .3s ease}
    @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .cache-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#e8f4fd;color:#1a7abf;margin-left:8px;vertical-align:middle}
    .video-meta{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid #f0f0ec;display:flex;gap:16px;align-items:flex-start}
    .thumb{width:120px;height:68px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#f0f0ec}
    .meta-text{flex:1;min-width:0}
    .video-title{font-size:16px;font-weight:600;margin-bottom:4px;line-height:1.4}
    .video-channel{font-size:13px;color:#888;margin-bottom:8px}
    .video-tags{display:flex;gap:6px;flex-wrap:wrap}
    .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:#f0f0ec;color:#666}
    .tag-src{background:#e8f4fd;color:#1a7abf}
    .tag-yes{background:#e8f5e9;color:#2e7d32}
    .tag-no{background:#fce4e4;color:#c62828}
    .section{margin-bottom:20px}
    .section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#999;margin-bottom:10px}
    .thesis{font-size:15px;line-height:1.65;color:#1a1a1a;padding:14px 16px;background:#fff8f2;border-radius:0 8px 8px 0;border-left:3px solid #e67e22}
    .points{list-style:none}
    .points li{font-size:14px;line-height:1.6;color:#333;padding:8px 0;border-bottom:1px solid #f5f5f0;display:flex;gap:10px}
    .points li:last-child{border-bottom:none}
    .point-num{font-size:11px;font-weight:600;color:#e67e22;flex-shrink:0;margin-top:3px;min-width:20px}
    .conclusions{display:flex;flex-direction:column;gap:8px}
    .conclusion{font-size:14px;color:#333;line-height:1.6;padding:10px 14px;background:#f8f8f5;border-radius:8px}
    .audience{font-size:14px;color:#333;padding:10px 14px;background:#f8f8f5;border-radius:8px}
    .worthy-box{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border-radius:8px}
    .worthy-box.yes{background:#e8f5e9}
    .worthy-box.no{background:#fce4e4}
    .worthy-icon{font-size:20px;flex-shrink:0}
    .worthy-text{font-size:14px;line-height:1.6}
    .worthy-text strong{display:block;margin-bottom:3px}
    .action-row{display:flex;gap:8px;margin-top:4px;padding-top:16px;border-top:1px solid #f0f0ec;flex-wrap:wrap}
    .action-btn{padding:7px 14px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;color:#555;transition:all .1s;white-space:nowrap}
    .action-btn:hover{border-color:#aaa;color:#1a1a1a}
    .action-btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
    .action-btn.primary:hover{opacity:.85}
    .action-btn.danger:hover{border-color:#e57373;color:#c62828}

    /* 分享图弹层 */
    .share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
    .share-overlay.show{display:flex;animation:fadein .2s ease}
    .share-modal{background:#fff;border-radius:16px;padding:24px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
    .share-modal-title{font-size:15px;font-weight:600;margin-bottom:4px}
    .share-modal-sub{font-size:13px;color:#888;margin-bottom:16px}
    .share-card-wrap{display:flex;justify-content:center;margin-bottom:16px}
    .share-btns{display:flex;gap:8px;justify-content:flex-end}

    /* ── 分享卡片（生成图用） ── */
    #share-card{
      width:390px;
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB",sans-serif;
      box-shadow:0 4px 24px rgba(0,0,0,.12);
    }
    .sc-header{position:relative;height:160px;overflow:hidden;background:#111}
    .sc-thumb{width:100%;height:100%;object-fit:cover;opacity:.55;display:block}
    .sc-header-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.2) 0%,rgba(0,0,0,.75) 100%)}
    .sc-header-text{position:absolute;bottom:0;left:0;right:0;padding:14px 18px}
    .sc-source{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
    .sc-title{font-size:15px;font-weight:700;color:#fff;line-height:1.4;margin-bottom:3px}
    .sc-channel{font-size:11px;color:rgba(255,255,255,.6)}

    .sc-body{padding:18px 18px 14px}
    .sc-thesis-label{font-size:9px;font-weight:700;color:#e67e22;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
    .sc-thesis{font-size:13px;font-weight:600;color:#111;line-height:1.6;padding:10px 12px;background:#fff8f2;border-left:3px solid #e67e22;border-radius:0 6px 6px 0;margin-bottom:14px}

    .sc-points-label{font-size:9px;font-weight:700;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
    .sc-point{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start}
    .sc-num{font-size:10px;font-weight:700;color:#e67e22;min-width:18px;margin-top:2px;flex-shrink:0}
    .sc-text{font-size:12px;color:#333;line-height:1.55}

    .sc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid #f0f0ec}
    .sc-verdict{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
    .sc-verdict.yes{background:#e8f5e9;color:#2e7d32}
    .sc-verdict.no{background:#fce4e4;color:#c62828}
    .sc-brand{font-size:10px;color:#bbb;letter-spacing:.04em}

    /* 历史 */
    .history-card{background:#fff;border-radius:12px;border:1px solid #e8e8e4;padding:20px 24px}
    .history-title{font-size:11px;font-weight:600;color:#999;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
    .history-list{display:flex;flex-direction:column;gap:2px}
    .history-item{padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px}
    .history-item:hover{background:#f5f5f0}
    .h-thumb{width:56px;height:32px;border-radius:4px;object-fit:cover;background:#f0f0ec;flex-shrink:0}
    .h-text{flex:1;min-width:0}
    .h-title{font-size:13px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .h-meta{font-size:11px;color:#aaa;margin-top:1px}
    .h-del{font-size:18px;color:#ccc;padding:0 4px;display:none}
    .history-item:hover .h-del{display:block}
    .h-del:hover{color:#c62828}
    .empty{font-size:13px;color:#bbb;text-align:center;padding:20px 0}
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">视频雷达</div>
  <div class="header-sub">YouTube 内容快速汇总</div>
</div>

<div class="main">
  <div class="input-card">
    <div class="input-label">粘贴 YouTube 链接，生成内容报告</div>
    <div class="input-row">
      <input class="url-input" id="url-input" type="text" placeholder="https://www.youtube.com/watch?v=..."/>
      <button class="submit-btn" id="submit-btn" onclick="submitUrl()">生成报告</button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-steps">
        <div class="step" id="s1"><div class="step-dot">1</div><div class="step-label">解析</div></div>
        <div class="step" id="s2"><div class="step-dot">2</div><div class="step-label">视频信息</div></div>
        <div class="step" id="s3"><div class="step-dot">3</div><div class="step-label">提取内容</div></div>
        <div class="step" id="s4"><div class="step-dot">4</div><div class="step-label">AI 分析</div></div>
        <div class="step" id="s5"><div class="step-dot">5</div><div class="step-label">完成</div></div>
      </div>
      <div class="progress-msg" id="progress-msg"></div>
    </div>
  </div>

  <!-- 报告 -->
  <div class="report-card" id="report-card">
    <div class="video-meta">
      <img class="thumb" id="r-thumb" src="" alt=""/>
      <div class="meta-text">
        <div class="video-title" id="r-title"></div>
        <div class="video-channel" id="r-channel"></div>
        <div class="video-tags" id="r-tags"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">核心观点</div>
      <div class="thesis" id="r-thesis"></div>
    </div>
    <div class="section">
      <div class="section-title">关键要点</div>
      <ul class="points" id="r-points"></ul>
    </div>
    <div class="section">
      <div class="section-title">主要结论</div>
      <div class="conclusions" id="r-conclusions"></div>
    </div>
    <div class="section">
      <div class="section-title">适合人群</div>
      <div class="audience" id="r-audience"></div>
    </div>
    <div class="section">
      <div class="section-title">值得看吗</div>
      <div class="worthy-box" id="r-worthy">
        <div class="worthy-icon" id="r-worthy-icon"></div>
        <div class="worthy-text">
          <strong id="r-worthy-label"></strong>
          <span id="r-worthy-reason"></span>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="action-btn primary" onclick="showShareImage()">生成分享图</button>
      <button class="action-btn" onclick="copyReport()">复制文本</button>
      <button class="action-btn" onclick="openVideo()">查看原视频</button>
      <button class="action-btn danger" onclick="deleteReport()">删除记录</button>
    </div>
  </div>

  <!-- 历史 -->
  <div class="history-card">
    <div class="history-title">最近报告</div>
    <div class="history-list" id="history-list">
      <div class="empty">暂无历史报告</div>
    </div>
  </div>
</div>

<!-- 分享图弹层 -->
<div class="share-overlay" id="share-overlay" onclick="closeShare(event)">
  <div class="share-modal" id="share-modal">
    <div class="share-modal-title">分享图预览</div>
    <div class="share-modal-sub">长按或右键图片保存，发送到微信 / 朋友圈</div>

    <!-- 分享卡片（html2canvas 截图目标） -->
    <div class="share-card-wrap">
      <div id="share-card">
        <div class="sc-header">
          <img class="sc-thumb" id="sc-thumb" src="" crossorigin="anonymous" alt=""/>
          <div class="sc-header-overlay"></div>
          <div class="sc-header-text">
            <div class="sc-source" id="sc-source"></div>
            <div class="sc-title" id="sc-title"></div>
            <div class="sc-channel" id="sc-channel"></div>
          </div>
        </div>
        <div class="sc-body">
          <div class="sc-thesis-label">核心观点</div>
          <div class="sc-thesis" id="sc-thesis"></div>
          <div class="sc-points-label">关键要点</div>
          <div id="sc-points"></div>
          <div class="sc-footer">
            <span class="sc-verdict" id="sc-verdict"></span>
            <span class="sc-brand">视频雷达</span>
          </div>
        </div>
      </div>
    </div>

    <div class="share-btns">
      <button class="action-btn" onclick="closeShare()">关闭</button>
      <button class="action-btn primary" id="download-btn" onclick="downloadImage()">下载图片</button>
    </div>
  </div>
</div>

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
  let currentVideoId = '';
  let currentUrl = '';
  let currentReport = {};
  let capturedCanvas = null;

  // ── 进度 ──
  function setStep(n, msg, isError) {
    document.getElementById('progress-wrap').classList.add('show');
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById('s' + i);
      el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    }
    const msgEl = document.getElementById('progress-msg');
    msgEl.textContent = msg || '';
    msgEl.className = 'progress-msg' + (isError ? ' error' : '');
  }
  function hideProgress() {
    document.getElementById('progress-wrap').classList.remove('show');
    for (let i = 1; i <= 5; i++) document.getElementById('s' + i).className = 'step';
  }

  // ── 提交 ──
  async function submitUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;
    currentUrl = url;
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('report-card').classList.remove('show');
    setStep(1, '正在处理...', false);

    const es = new EventSource(`/api/process?url=${encodeURIComponent(url)}`);
    es.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      setStep(d.step, d.msg, false);
    });
    es.addEventListener('done', e => {
      es.close();
      const d = JSON.parse(e.data);
      setStep(5, d.cached ? '✅ 命中缓存，秒速返回' : '✅ 报告生成完成', false);
      setTimeout(() => { hideProgress(); renderReport(d, url); loadHistory(); }, 800);
      document.getElementById('submit-btn').disabled = false;
    });
    es.addEventListener('error', e => {
      es.close();
      try { const d = JSON.parse(e.data); setStep(0, '❌ ' + d.msg, true); }
      catch { setStep(0, '❌ 处理失败，请检查链接或网络', true); }
      document.getElementById('submit-btn').disabled = false;
    });
    es.onerror = () => {
      if (es.readyState === EventSource.CLOSED) return;
      es.close();
      setStep(0, '❌ 连接中断', true);
      document.getElementById('submit-btn').disabled = false;
    };
  }

  // ── 渲染报告 ──
  function renderReport(data, url) {
    const r = data.report;
    currentReport = data;
    const m = url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    currentVideoId = m ? m[1] : '';

    if (currentVideoId) {
      document.getElementById('r-thumb').src =
        `https://img.youtube.com/vi/${currentVideoId}/mqdefault.jpg`;
    }
    document.getElementById('r-title').innerHTML =
      (data.title || '未知标题') +
      (data.cached ? '<span class="cache-badge">缓存</span>' : '');
    document.getElementById('r-channel').textContent = data.channel || '';

    const worthy = r.watch_worthy;
    const src = data.source === 'youtube_captions' ? '字幕' : '语音转录';
    document.getElementById('r-tags').innerHTML =
      `<span class="tag tag-src">${src}</span>` +
      `<span class="tag">${data.word_count} 词</span>` +
      `<span class="tag ${worthy ? 'tag-yes' : 'tag-no'}">${worthy ? '值得看' : '可跳过'}</span>`;

    document.getElementById('r-thesis').textContent = r.core_thesis || '';
    document.getElementById('r-points').innerHTML =
      (r.key_points || []).map((p, i) =>
        `<li><span class="point-num">0${i+1}</span><span>${p}</span></li>`
      ).join('');
    document.getElementById('r-conclusions').innerHTML =
      (r.conclusions || []).map(c => `<div class="conclusion">${c}</div>`).join('');
    document.getElementById('r-audience').textContent = r.target_audience || '';

    const box = document.getElementById('r-worthy');
    box.className = 'worthy-box ' + (worthy ? 'yes' : 'no');
    document.getElementById('r-worthy-icon').textContent = worthy ? '✅' : '⏭️';
    document.getElementById('r-worthy-label').textContent = worthy ? '值得看' : '可跳过';
    document.getElementById('r-worthy-reason').textContent = r.reason || '';

    document.getElementById('report-card').classList.add('show');
    document.getElementById('report-card').scrollIntoView({behavior:'smooth'});
  }

  // ── 分享图 ──
  function showShareImage() {
    const r = currentReport.report || {};
    const worthy = r.watch_worthy;

    // 填充分享卡片数据
    const thumbUrl = currentVideoId
      ? `https://img.youtube.com/vi/${currentVideoId}/mqdefault.jpg`
      : '';
    document.getElementById('sc-thumb').src = thumbUrl;
    document.getElementById('sc-source').textContent =
      'YouTube · ' + (currentReport.channel || '');
    document.getElementById('sc-title').textContent =
      currentReport.title || '未知标题';
    document.getElementById('sc-channel').textContent =
      currentReport.channel || '';
    document.getElementById('sc-thesis').textContent = r.core_thesis || '';

    // 要点（最多5条）
    const points = (r.key_points || []).slice(0, 5);
    document.getElementById('sc-points').innerHTML = points.map((p, i) =>
      `<div class="sc-point">
        <span class="sc-num">0${i+1}</span>
        <span class="sc-text">${p}</span>
      </div>`
    ).join('');

    const verdict = document.getElementById('sc-verdict');
    verdict.textContent = worthy ? '✓ 值得看' : '✕ 可跳过';
    verdict.className = 'sc-verdict ' + (worthy ? 'yes' : 'no');

    // 打开弹层，生成截图
    document.getElementById('share-overlay').classList.add('show');
    capturedCanvas = null;
    generateCanvas();
  }

  async function generateCanvas() {
    const btn = document.getElementById('download-btn');
    btn.textContent = '生成中...';
    btn.disabled = true;

    // 等图片加载完
    await new Promise(r => setTimeout(r, 600));

    try {
      capturedCanvas = await html2canvas(document.getElementById('share-card'), {
        scale: 2,              // 2x 高清
        useCORS: true,         // 允许跨域图片
        backgroundColor: '#ffffff',
        logging: false,
      });
      btn.textContent = '下载图片';
      btn.disabled = false;
    } catch(e) {
      btn.textContent = '生成失败';
      console.error(e);
    }
  }

  function downloadImage() {
    if (!capturedCanvas) return;
    const link = document.createElement('a');
    const title = (currentReport.title || 'report').slice(0, 20).replace(/[/\\?%*:|"<>]/g, '');
    link.download = `视频报告_${title}.png`;
    link.href = capturedCanvas.toDataURL('image/png');
    link.click();
  }

  function closeShare(e) {
    if (e && e.target !== document.getElementById('share-overlay')) return;
    document.getElementById('share-overlay').classList.remove('show');
  }

  // ── 操作按钮 ──
  function copyReport() {
    const r = currentReport.report || {};
    const text = [
      `【${currentReport.title}】`,
      `频道：${currentReport.channel}`,
      '',
      `核心观点：${r.core_thesis}`,
      '',
      '关键要点：',
      ...(r.key_points || []).map((p, i) => `${i+1}. ${p}`),
      '',
      '主要结论：',
      ...(r.conclusions || []).map(c => `• ${c}`),
      '',
      `适合人群：${r.target_audience}`,
      `是否值得看：${r.watch_worthy ? '值得看' : '可跳过'} — ${r.reason}`,
    ].join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = event.target;
      btn.textContent = '已复制 ✓';
      setTimeout(() => btn.textContent = '复制文本', 1500);
    });
  }
  function openVideo() { window.open(currentUrl, '_blank'); }
  async function deleteReport() {
    if (!currentVideoId || !confirm('确认删除这条记录？')) return;
    await fetch(`/api/reports/${currentVideoId}`, {method:'DELETE'});
    document.getElementById('report-card').classList.remove('show');
    loadHistory();
  }

  // ── 历史 ──
  async function loadHistory() {
    try {
      const list = await (await fetch('/api/reports')).json();
      const el = document.getElementById('history-list');
      if (!list.length) { el.innerHTML = '<div class="empty">暂无历史报告</div>'; return; }
      el.innerHTML = list.map(r => `
        <div class="history-item" onclick="fillAndLoad('${r.url}')">
          <img class="h-thumb"
            src="https://img.youtube.com/vi/${r.video_id}/mqdefault.jpg"
            onerror="this.style.display='none'"/>
          <div class="h-text">
            <div class="h-title">${r.title}</div>
            <div class="h-meta">${r.channel||''} · ${fmtTime(r.created_at)}</div>
          </div>
          <span class="h-del" onclick="delHistory(event,'${r.video_id}')">×</span>
        </div>
      `).join('');
    } catch(e) {}
  }
  function fillAndLoad(url) { document.getElementById('url-input').value = url; submitUrl(); }
  async function delHistory(e, vid) {
    e.stopPropagation();
    await fetch(`/api/reports/${vid}`, {method:'DELETE'});
    loadHistory();
  }
  function fmtTime(ts) {
    if (!ts || ts.length < 12) return '';
    return `${ts.slice(0,4)}-${ts.slice(4,6)}-${ts.slice(6,8)} ${ts.slice(9,11)}:${ts.slice(11,13)}`;
  }

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitUrl();
  });
  loadHistory();
</script>
</body>
</html>
