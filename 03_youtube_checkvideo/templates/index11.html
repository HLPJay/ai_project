<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频雷达 · 内容汇总</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e4;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title { font-size: 16px; font-weight: 600; }
    .header-sub { font-size: 13px; color: #888; }

    .main { max-width: 760px; margin: 0 auto; padding: 32px 20px; }

    /* 输入区 */
    .input-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e8e4;
      padding: 24px;
      margin-bottom: 24px;
    }
    .input-label { font-size: 13px; color: #666; margin-bottom: 8px; }
    .input-row { display: flex; gap: 10px; }
    .url-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .url-input:focus { border-color: #1a1a1a; }
    .submit-btn {
      padding: 10px 22px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .submit-btn:hover { opacity: .85; }
    .submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* 状态提示 */
    .status {
      font-size: 13px;
      color: #888;
      margin-top: 12px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #ddd;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status.error { color: #c0392b; }

    /* 报告卡片 */
    .report-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e8e4;
      padding: 28px;
      margin-bottom: 20px;
      display: none;
    }
    .report-card.show { display: block; }

    .video-meta { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #f0f0ec; }
    .video-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .video-channel { font-size: 13px; color: #888; }
    .video-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; padding: 3px 8px;
      border-radius: 20px;
      background: #f0f0ec;
      color: #666;
    }
    .tag-source { background: #e8f4fd; color: #1a7abf; }
    .tag-worthy { background: #e8f5e9; color: #2e7d32; }
    .tag-skip { background: #fce4e4; color: #c62828; }

    .section { margin-bottom: 20px; }
    .section-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }

    .thesis {
      font-size: 15px;
      line-height: 1.65;
      color: #1a1a1a;
      padding: 14px 16px;
      background: #f8f8f5;
      border-radius: 8px;
      border-left: 3px solid #1a1a1a;
    }

    .points { list-style: none; }
    .points li {
      font-size: 14px;
      line-height: 1.6;
      color: #333;
      padding: 8px 0;
      border-bottom: 1px solid #f5f5f0;
      display: flex;
      gap: 10px;
    }
    .points li:last-child { border-bottom: none; }
    .point-num {
      font-size: 11px; font-weight: 600;
      color: #bbb; flex-shrink: 0;
      margin-top: 3px;
    }

    .conclusions { display: flex; flex-direction: column; gap: 8px; }
    .conclusion {
      font-size: 14px; color: #333; line-height: 1.6;
      padding: 10px 14px;
      background: #f8f8f5;
      border-radius: 8px;
    }

    .audience {
      font-size: 14px; color: #333;
      padding: 10px 14px;
      background: #f8f8f5;
      border-radius: 8px;
    }

    .worthy-box {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 14px 16px;
      border-radius: 8px;
    }
    .worthy-box.yes { background: #e8f5e9; }
    .worthy-box.no { background: #fce4e4; }
    .worthy-icon { font-size: 20px; flex-shrink: 0; }
    .worthy-text { font-size: 14px; line-height: 1.6; }
    .worthy-text strong { display: block; margin-bottom: 3px; }

    /* 历史记录 */
    .history-card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e8e4;
      padding: 20px 24px;
    }
    .history-title { font-size: 13px; font-weight: 600; color: #999; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .05em; }
    .history-list { display: flex; flex-direction: column; gap: 2px; }
    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .1s;
    }
    .history-item:hover { background: #f5f5f0; }
    .history-item-title { font-size: 13px; font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
    .history-item-meta { font-size: 11px; color: #aaa; }
    .empty-history { font-size: 13px; color: #bbb; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">视频雷达</div>
    <div class="header-sub">YouTube 内容快速汇总</div>
  </div>
</div>

<div class="main">

  <!-- 输入区 -->
  <div class="input-card">
    <div class="input-label">粘贴 YouTube 链接，生成内容报告</div>
    <div class="input-row">
      <input
        class="url-input"
        id="url-input"
        type="text"
        placeholder="https://www.youtube.com/watch?v=..."
      />
      <button class="submit-btn" id="submit-btn" onclick="submitUrl()">
        生成报告
      </button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <!-- 报告区 -->
  <div class="report-card" id="report-card">

    <div class="video-meta">
      <div class="video-title" id="r-title"></div>
      <div class="video-channel" id="r-channel"></div>
      <div class="video-tags" id="r-tags"></div>
    </div>

    <div class="section">
      <div class="section-title">核心观点</div>
      <div class="thesis" id="r-thesis"></div>
    </div>

    <div class="section">
      <div class="section-title">关键要点</div>
      <ul class="points" id="r-points"></ul>
    </div>

    <div class="section">
      <div class="section-title">主要结论</div>
      <div class="conclusions" id="r-conclusions"></div>
    </div>

    <div class="section">
      <div class="section-title">适合人群</div>
      <div class="audience" id="r-audience"></div>
    </div>

    <div class="section">
      <div class="section-title">值得看吗</div>
      <div class="worthy-box" id="r-worthy">
        <div class="worthy-icon" id="r-worthy-icon"></div>
        <div class="worthy-text">
          <strong id="r-worthy-label"></strong>
          <span id="r-worthy-reason"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- 历史记录 -->
  <div class="history-card" id="history-card">
    <div class="history-title">最近报告</div>
    <div class="history-list" id="history-list">
      <div class="empty-history">暂无历史报告</div>
    </div>
  </div>

</div>

<script>
  // 加载历史记录
  async function loadHistory() {
    try {
      const res = await fetch('/api/reports');
      const list = await res.json();
      const el = document.getElementById('history-list');
      if (!list.length) return;
      el.innerHTML = list.map(r => `
        <div class="history-item" onclick="fillUrl('${r.url}')">
          <div class="history-item-title">${r.title || '未知标题'}</div>
          <div class="history-item-meta">${r.channel || ''} · ${formatTime(r.created_at)}</div>
        </div>
      `).join('');
    } catch(e) {}
  }

  function formatTime(ts) {
    if (!ts || ts.length < 8) return '';
    return `${ts.slice(0,4)}-${ts.slice(4,6)}-${ts.slice(6,8)} ${ts.slice(9,11)}:${ts.slice(11,13)}`;
  }

  function fillUrl(url) {
    document.getElementById('url-input').value = url;
  }

  // 提交并生成报告
  async function submitUrl() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) return;

    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('status');
    const card = document.getElementById('report-card');

    btn.disabled = true;
    card.classList.remove('show');
    setStatus('正在获取视频内容...', false);

    try {
      const res = await fetch('/api/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || '请求失败');
      }

      setStatus('正在生成报告...', false);
      const data = await res.json();
      renderReport(data);
      setStatus('', false);
      loadHistory();

    } catch(e) {
      setStatus(e.message, true);
    } finally {
      btn.disabled = false;
    }
  }

  function setStatus(msg, isError) {
    const el = document.getElementById('status');
    if (!msg) { el.innerHTML = ''; return; }
    el.className = 'status' + (isError ? ' error' : '');
    el.innerHTML = isError
      ? `<span>❌ ${msg}</span>`
      : `<div class="spinner"></div><span>${msg}</span>`;
  }

  function renderReport(data) {
    const r = data.report;

    document.getElementById('r-title').textContent = data.title || '未知标题';
    document.getElementById('r-channel').textContent = data.channel || '';

    // 标签
    const tags = [
      `<span class="tag tag-source">${data.source === 'youtube_captions' ? '字幕' : 'Whisper 转录'}</span>`,
      `<span class="tag">${data.word_count} 词</span>`,
    ];
    document.getElementById('r-tags').innerHTML = tags.join('');

    // 核心观点
    document.getElementById('r-thesis').textContent = r.core_thesis || '';

    // 关键要点
    const points = (r.key_points || []).map((p, i) =>
      `<li><span class="point-num">0${i+1}</span><span>${p}</span></li>`
    ).join('');
    document.getElementById('r-points').innerHTML = points;

    // 结论
    const conclusions = (r.conclusions || []).map(c =>
      `<div class="conclusion">${c}</div>`
    ).join('');
    document.getElementById('r-conclusions').innerHTML = conclusions;

    // 适合人群
    document.getElementById('r-audience').textContent = r.target_audience || '';

    // 值得看
    const worthy = r.watch_worthy;
    const box = document.getElementById('r-worthy');
    box.className = 'worthy-box ' + (worthy ? 'yes' : 'no');
    document.getElementById('r-worthy-icon').textContent = worthy ? '✅' : '⏭️';
    document.getElementById('r-worthy-label').textContent = worthy ? '值得看' : '可跳过';
    document.getElementById('r-worthy-reason').textContent = r.reason || '';

    document.getElementById('report-card').classList.add('show');
    document.getElementById('report-card').scrollIntoView({ behavior: 'smooth' });
  }

  // 回车提交
  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitUrl();
  });

  // 初始化
  loadHistory();
</script>

</body>
</html>
